<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CalcURisk Pro Mode</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CalcURisk">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
:root{
  --bg:#0d1117;
  --panel:#121922;
  --panel-2:#0f151d;
  --line:#263241;
  --line-soft:rgba(255,255,255,.07);
  --text:#eef4fb;
  --muted:#99a7b7;
  --accent:#64b5f6;
  --accent-2:#46a2ea;
  --green:#68d391;
  --red:#f07c8f;
  --amber:#f2b562;
  --chip:#18212d;
  --shadow:0 20px 40px rgba(0,0,0,.30);
  --radius:22px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
  background:radial-gradient(circle at top left, rgba(100,181,246,.12), transparent 28%), var(--bg);
  color:var(--text);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
.app{
  height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}
.phone{
  width:min(100%,440px);
  height:100%;
  border:1px solid var(--line);
  border-radius:30px;
  background:linear-gradient(180deg,#151d27 0%, #10151d 100%);
  box-shadow:var(--shadow);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  position:relative;
}
.top{
  padding:8px 14px 8px;
  border-bottom:1px solid var(--line-soft);
  background:rgba(18,25,34,.96);
  backdrop-filter: blur(10px);
}
.topbar,.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.logo{
  width:36px;height:36px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  background:rgba(242,181,98,.10);border:1px solid rgba(242,181,98,.25);color:#ffc979;font-size:18px;flex:0 0 auto;
}
.eyebrow{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#92e7f6}
.title{font-size:17px;font-weight:800;line-height:1.05;margin-top:1px}
.sub{font-size:11px;color:var(--muted);margin-top:2px}
.icon-btn,.currency-toggle button,.segmented button,.chip-select,.action,.drawer-btn,.status-btn,.mini-btn{
  font-family:inherit;
}
.icon-btn{
  border:1px solid var(--line);background:var(--panel-2);color:var(--text);border-radius:14px;padding:10px 12px;
  font-size:13px;font-weight:700;cursor:pointer;
}
.main{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:5px 8px 4px;
  display:grid;
  grid-template-rows:auto auto auto auto auto auto auto;
  gap:4px;
}
.block{
  background:rgba(255,255,255,.03);
  border:1px solid var(--line-soft);
  border-radius:18px;
  padding:6px;
}
.account-row{display:grid;grid-template-columns:1.2fr .8fr;gap:4px}
.ticker-row{display:grid;grid-template-columns:1.15fr .85fr;gap:4px}
.input-shell, .metric, .chip-select, .status-btn, .action, .segmented, .currency-toggle{background:var(--panel-2);border:1px solid var(--line);}
.input-shell{border-radius:16px;padding:4px 10px;min-width:0}
.input-shell.entry{border-color:rgba(100,181,246,.40)}
.input-shell.stop{border-color:rgba(240,124,143,.38)}
.input-shell.target{border-color:rgba(104,211,145,.34)}
.label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
input,select{
  width:100%;background:none;border:none;outline:none;color:var(--text);font-size:15px;font-weight:700;padding:0;line-height:1.2;position:relative;z-index:2;
}
select{appearance:auto;-webkit-appearance:menulist;-moz-appearance:menulist;background:none;padding-right:0;cursor:pointer;pointer-events:auto;touch-action:manipulation}
select option{background:#0e1520;color:#f7fbff}
.ticker{font-size:22px;letter-spacing:.02em;text-transform:uppercase}
.segmented{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px;border-radius:16px}
.segmented button{
  height:36px;border:0;border-radius:12px;background:transparent;color:var(--muted);font-size:14px;font-weight:800;cursor:pointer;
}
.segmented button.active{background:rgba(100,181,246,.14);color:#e4f3ff}

.currency-wrap{padding-bottom:10px}
.currency-toggle{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px;border-radius:20px;background:#08111b;border:1px solid rgba(100,181,246,.22);box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}
.currency-toggle button{height:36px;border:0;border-radius:14px;background:transparent;color:#b9c7d8;font-size:24px;font-weight:800;cursor:pointer;line-height:1}
.currency-toggle button.active{background:linear-gradient(180deg,rgba(57,184,220,.18),rgba(57,184,220,.08));color:#8ef1ff;box-shadow:0 0 0 1px rgba(57,184,220,.18) inset}
.chips{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.chip-select{border-radius:16px;padding:5px 10px;position:relative}.chip-select.has-select{padding-right:8px}.chip-select.has-select select{min-height:30px}
.micro-row{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:4px}
.micro-row input{font-size:19px !important;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.metric{border-radius:16px;padding:6px 9px;min-height:44px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.metric .k{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.metric .v{font-size:15px;font-weight:800;line-height:1.1;margin-top:4px}
.metric .s{font-size:11px;color:var(--muted);margin-top:2px}
.metric.risk{border-color:rgba(240,124,143,.24);background:rgba(240,124,143,.05)}
.metric.rr{border-color:rgba(100,181,246,.22)}
.metric.shares{border-color:rgba(100,181,246,.22);background:#101a24}
.metric.shares input{text-align:center;font-size:20px;color:#a9e8ff}
.metric.capital{border-color:rgba(242,181,98,.22);background:rgba(242,181,98,.05)}
.status-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.status-btn{
  border-radius:16px;padding:3px 8px;cursor:pointer;color:var(--text);text-align:center;font-size:17px;font-weight:800;
}
.status-btn small{display:block;margin-top:2px;color:#d5e0ea;font-size:10px;font-weight:700}
.status-btn.active{box-shadow:0 0 0 1px rgba(255,255,255,.05) inset}
.status-btn.exec.active{border-color:var(--green);background:rgba(104,211,145,.08)}
.note-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.note-pill{min-height:50px;display:flex;align-items:center;padding:0 12px;border-radius:16px;border:1px dashed rgba(255,255,255,.10);color:var(--muted);background:rgba(255,255,255,.02)}
.bottom{
  position:sticky;bottom:0;
  padding:5px 8px 8px;
  background:linear-gradient(180deg, rgba(16,21,29,0) 0%, rgba(16,21,29,.94) 18%, rgba(16,21,29,1) 100%);
}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.action{
  border-radius:16px;padding:11px 8px;border:1px solid var(--line);color:var(--text);font-weight:800;font-size:13px;cursor:pointer;
}
.action.primary{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#07263c;border:none}
.action.ghost{background:var(--panel-2)}
.action.warn{background:#16202b}
.helper{font-size:11px;color:var(--muted);padding:0 2px 2px}
.toast{
  position:absolute;left:50%;bottom:86px;transform:translateX(-50%) translateY(8px);opacity:0;pointer-events:none;
  background:#0f1620;border:1px solid var(--line);border-radius:14px;padding:10px 12px;font-size:13px;font-weight:800;color:#f7fbff;
  transition:all .18s ease;z-index:15;max-width:calc(100% - 20px);white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.drawer-backdrop{
  position:absolute;inset:0;background:rgba(0,0,0,.46);opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:20;
}
.drawer-backdrop.open{opacity:1;pointer-events:auto}
.drawer{
  position:absolute;left:0;right:0;bottom:0;z-index:21;background:#0f151d;border-top:1px solid var(--line);border-radius:24px 24px 0 0;
  transform:translateY(102%);transition:transform .22s ease;max-height:76%;display:flex;flex-direction:column;
}
.drawer.open{transform:translateY(0)}
.drawer-head{padding:14px 14px 10px;border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;gap:10px}
.drawer-title{font-size:16px;font-weight:800}
.drawer-sub{font-size:11px;color:var(--muted);margin-top:2px}
.drawer-actions{display:flex;gap:8px}
.drawer-body{padding:10px 10px 14px;overflow:auto;display:flex;flex-direction:column;gap:8px}
.plan{
  border:1px solid var(--line);background:#141c26;border-radius:18px;padding:10px;
}
.plan-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.plan-title{font-size:14px;font-weight:800}
.plan-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35}
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.mini{background:#0f151d;border:1px solid var(--line-soft);border-radius:12px;padding:7px;text-align:center}
.mini .k{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.mini .v{font-size:13px;font-weight:800;margin-top:3px}
.drawer-btn,.mini-btn{
  border:1px solid var(--line);background:#111a24;color:var(--text);border-radius:12px;padding:9px 10px;font-size:12px;font-weight:800;cursor:pointer;
}
.mini-btn{padding:8px 10px}
.plan-buttons{display:flex;gap:8px;margin-top:8px}
.actual-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px}
.actual-grid .input-shell{padding:7px 8px;border-radius:12px;cursor:text;}
.actual-grid input,.actual-grid select,.actual-grid textarea{font-size:13px;font-weight:700;-webkit-user-select:text;user-select:text;touch-action:manipulation;cursor:text;}
.actual-grid textarea{width:100%;background:none;border:none;outline:none;color:var(--text);padding:0;line-height:1.35;min-height:84px;resize:vertical;font-family:inherit}
.field-sub{margin-top:4px;font-size:11px;color:var(--muted);line-height:1.2}
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 0 8px}
.summary-mini{background:#141c26;border:1px solid var(--line);border-radius:14px;padding:8px;text-align:center}
.summary-mini .k{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.summary-mini .v{font-size:15px;font-weight:800;margin-top:4px}
.empty{padding:20px 12px;border:1px dashed rgba(255,255,255,.12);border-radius:16px;text-align:center;color:var(--muted);font-size:12px;background:rgba(255,255,255,.02)}
@media (max-width:390px){
  .phone{border-radius:0;width:100%;height:100dvh}
  .app{padding:0}
}

/* Refined header */
.top{
  padding:8px 14px 8px;
  border-bottom:1px solid var(--line-soft);
  background:rgba(18,25,34,.96);
  backdrop-filter:blur(10px);
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:2px 0;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}
.logo-img{
  display:block;
  height:56px;
  width:auto;
  max-width:220px;
  object-fit:contain;
}
@media (max-width:640px){
  .top{padding:8px 12px 8px;}
  .topbar{gap:10px;}
  .logo-img{
    height:50px;
    max-width:160px;
  }
  .icon-btn#openJournalBtn{
    padding:10px 12px;
    font-size:13px;
    white-space:nowrap;
  }
}


/* Bigger, tighter header/logo fit */
.top{
  padding: 4px 16px 6px !important;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  height:84px !important;
}
.brand{
  display:flex;
  align-items:center;
  height:100%;
  min-width:0;
}
.logo-img{
  display:block;
  height:78px !important;
  width:auto;
  max-width:none !important;
  object-fit:contain;
  filter:none !important;
}
.icon-btn#openJournalBtn{
  align-self:center;
}
@media (max-width:640px){
  .top{
    padding:4px 12px 6px !important;
  }
  .topbar{
    height:76px !important;
  }
  .logo-img{
    height:68px !important;
  }
}


/* iPhone app + splash fixes */
html,body{
  padding:0;
}
.app{
  min-height:100dvh;
  padding-top:calc(env(safe-area-inset-top) + 10px);
  padding-bottom:env(safe-area-inset-bottom);
}
.spc{
  width:14px;
  height:var(--h);
  background:linear-gradient(180deg, rgba(255,255,255,.14), var(--c));
  border-radius:4px 4px 2px 2px;
  box-shadow:0 0 12px color-mix(in srgb, var(--c) 45%, transparent);
  transform-origin:bottom center;
  transform:scaleY(0.05);
  opacity:0;
  animation:growC .38s ease forwards;
  animation-delay:var(--d, 0s);
}
.spc::before{
  content:"";
  position:absolute;
  left:50%;
  top:-8px;
  width:2px;
  height:8px;
  transform:translateX(-50%);
  background:rgba(255,255,255,.85);
  border-radius:2px;
  opacity:.9;
}
@keyframes growC{
  from{transform:scaleY(0.05);opacity:0;}
  to{transform:scaleY(1);opacity:1;}
}

</style>
</head>

    <div class="main">
      <div class="account-row">
        <div class="chip-select">
          <div class="label" id="accountSizeLabel">Account Size (£)</div>
          <input id="accountSize" value="" inputmode="decimal" autocomplete="off" placeholder="0.00" />
        </div>
        <div class="chip-select currency-wrap">
          <div class="label">Currency</div>
          <div class="currency-toggle" role="group" aria-label="Currency selector">
            <button type="button" data-currency="USD">$</button>
            <button type="button" class="active" data-currency="GBP">£</button>
            <button type="button" data-currency="EUR">€</button>
          </div>
          <input id="currency" type="hidden" value="GBP" />
        </div>
      </div>

      <div class="ticker-row">
        <div class="input-shell">
          <div class="label">Ticker</div>
          <input id="ticker" class="ticker" placeholder="AAPL" autocomplete="off" autocapitalize="characters" spellcheck="false" />
        </div>
        <div class="segmented" role="group" aria-label="Direction">
          <button type="button" class="active" data-dir="long">Long</button>
          <button type="button" data-dir="short">Short</button>
        </div>
      </div>

      <div class="chips">
        <div class="chip-select has-select">
          <div class="label">Pattern</div>
          <select id="pattern"></select>
        </div>
        <div class="chip-select has-select">
          <div class="label">Catalyst</div>
          <select id="catalyst"></select>
        </div>
      </div>

      <div class="chips">
        <div class="chip-select has-select">
          <div class="label">Session</div>
          <select id="session"></select>
        </div>
        <div class="chip-select has-select">
          <div class="label">Risk %</div>
          <select id="riskPct">
            <option value="0.005">0.5%</option>
            <option value="0.01" selected>1%</option>
            <option value="0.015">1.5%</option>
            <option value="0.02">2%</option>
          </select>
        </div>
      </div>

      <div class="micro-row">
        <div class="input-shell entry">
          <div class="label">Entry</div>
          <input id="entry" value="" inputmode="decimal" placeholder="0.00" />
        </div>
        <div class="input-shell stop" style="position:relative;">
          <div class="label" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0;">SL<button id="slPctToggle" onclick="cycleSLPercent()" style="height:18px;padding:0 6px;border:0;border-radius:6px;background:linear-gradient(180deg,rgba(57,184,220,.18),rgba(57,184,220,.08));color:#8ef1ff;box-shadow:0 0 0 1px rgba(57,184,220,.18) inset;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.04em;white-space:nowrap;touch-action:manipulation;font-family:inherit;line-height:18px;">Risk 10%</button></div>
          <input id="stop" value="" inputmode="decimal" placeholder="0.00" />
        </div>
        <div class="input-shell target">
          <div class="label">Target</div>
          <input id="target" value="" inputmode="decimal" placeholder="0.00" />
        </div>
      </div>

      <div class="metrics" style="grid-template-columns:repeat(4,1fr);gap:5px;">
        <div class="metric shares">
          <div class="k">Shares</div>
          <input id="shares" value="" inputmode="numeric" placeholder="0" />
          <div class="s">Auto</div>
        </div>
        <div class="metric rr">
          <div class="k">R:R</div>
          <div class="v" id="rr">—</div>
          <div class="s" id="quality">—</div>
        </div>
        <div class="metric risk">
          <div class="k">Risk</div>
          <div class="v" id="riskValue">—</div>
          <div class="s" id="nativeRisk">—</div>
        </div>
        <div class="metric capital">
          <div class="k">Capital</div>
          <div class="v" id="capitalValue">—</div>
          <div class="s" id="capitalPct">0.0%</div>
        </div>
      </div>

      <div class="status-row">
        <button class="status-btn watch active" data-status="watching" type="button"><span style="font-size:20px;line-height:1;display:block;">👁️</span><small>Watching</small></button>
        <button class="status-btn exec" data-status="executed" type="button"><span style="font-size:20px;line-height:1;display:block;">🚀</span><small>Execute + Save</small></button>
      </div>
      <div class="helper" id="helper"></div>
      <div class="input-shell" style="margin-top:3px;">
        <div class="label">Quick Note (optional)</div>
        <input id="quickNote" inputmode="text" placeholder="e.g. tight float, news catalyst, scaling in…" style="font-size:13px;" />
      </div>

    </div>

    <div id="fxDisplay" style="padding:2px 10px 0;min-height:14px;"></div>
    <div class="bottom">
      <div class="actions">
        <button class="action primary" id="alertBtn" type="button">Send Alert</button>
        <button class="action warn" id="resetBtn" type="button">Reset</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <div class="drawer" id="journalDrawer">
      <div class="drawer-handle" style="width:100%;display:flex;justify-content:center;padding:8px 0 0;cursor:grab;touch-action:none;">
      <div style="width:36px;height:4px;border-radius:2px;background:var(--muted);opacity:0.5;"></div>
    </div>

</div>

<script>
const STORAGE_KEY = 'calcurisk_pro_mode_rewrite_v1';
const APP_VERSION = 'v2_clean';
// Clear old state if version mismatch (fresh start)
if(localStorage.getItem('calcurisk_app_version') !== APP_VERSION){
  localStorage.removeItem(STORAGE_KEY);
  localStorage.setItem('calcurisk_app_version', APP_VERSION);
}
const JOURNAL_KEY = 'calcurisk_pro_mode_journal_v1';
const NOTE_KEY = 'calcurisk_pro_mode_note_v1';
const patternOptions = [
  'BRB','Breakout / HOD','Cup and Handle','Day 1 Gapper','Day 2 Continuation','Day 3 Surge','Dip and Rip','Dollar Cross','Flag Break','Inverted H & S','Multiday Runner','ORB','Short Squeeze','VWAP Hold','VWAP Reclaim'
];
const catalystOptions = [
  'News A+','Earnings','PR / Press Release','FDA / Clinical','Gapper Momentum','High Relative Volume','Sector Strength','Technical Break Only','Short Squeeze Only'
];
const sessionOptions = ['Pre-Market','Market Open','Before Midday','Midday','Afternoon','Power Hour','After Hours'];
const baseCurrency = 'GBP';
const currencyMeta = {
  GBP:{symbol:'£', perGBP:1},
  USD:{symbol:'$', perGBP:1.27},
  EUR:{symbol:'€', perGBP:1.17}
};


// ── Live FX (frankfurter.app, 30min cache) ──
const FX_KEY = 'calcurisk_fx_v2';
async function fetchLiveFX(){
  try{
    const c = JSON.parse(localStorage.getItem(FX_KEY)||'{}');
    if(c.ts && Date.now()-c.ts < 1800000 && c.rates){
      currencyMeta.USD.perGBP = c.rates.USD;
      currencyMeta.EUR.perGBP = c.rates.EUR;
      showFX(c.rates, c.ts); return;
    }
    const r = await fetch('https://api.frankfurter.app/latest?from=GBP&to=USD,EUR');
    const d = await r.json();
    if(d&&d.rates){
      currencyMeta.USD.perGBP = d.rates.USD;
      currencyMeta.EUR.perGBP = d.rates.EUR;
      const ts = Date.now();
      localStorage.setItem(FX_KEY, JSON.stringify({rates:d.rates, ts}));
      showFX(d.rates, ts);
      recalc();
    }
  }catch(e){}
}
function showFX(rates, ts){
  const el = document.getElementById('fxDisplay');
  if(!el) return;
  const date = new Date(ts).toISOString().slice(0,10);
  el.innerHTML = `<span style="color:var(--muted);font-size:10px;letter-spacing:.06em;">USD→GBP $1 = ${(1/rates.USD).toFixed(4)} <span style="color:var(--green)">●</span> ${date}</span>`;
}

const $ = id => document.getElementById(id);
function attachNativeSelectOpen(id){
  const select = $(id);
  const wrapper = select.closest('.chip-select');
  if(!wrapper) return;
  wrapper.addEventListener('click', (e) => {
    if(e.target.tagName === 'SELECT') return;
    if(typeof select.showPicker === 'function'){
      try{ select.showPicker(); return; }catch(_){}
    }
    select.focus();
    select.click();
  });
}
const state = {
  direction:'long',
  status:'watching',
  stopPercent:0.10,
  stopTouched:false,
  targetTouched:false,
  sharesTouched:false,
  note:'',
  journal:[]
};

function populateSelect(select, values){
  select.innerHTML = `<option value="" disabled selected></option>` + values.map(v => `<option>${v}</option>`).join('');
}
function guessSession(){
  const hour = new Date().getHours();
  if(hour < 8) return 'Pre-Market';
  if(hour < 11) return 'Market Open';
  if(hour < 14) return 'Midday';
  if(hour < 17) return 'Power Hour';
  return 'After Hours';
}
function num(v){
  const n = parseFloat(String(v).replace(/,/g,''));
  return Number.isFinite(n) ? n : 0;
}
function fmtMoney(value, currency){
  const meta = currencyMeta[currency] || currencyMeta[baseCurrency];
  return `${meta.symbol}${Number(value).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;
}
function convertMoney(value, fromCurrency, toCurrency){
  const fromMeta = currencyMeta[fromCurrency] || currencyMeta[baseCurrency];
  const toMeta = currencyMeta[toCurrency] || currencyMeta[baseCurrency];
  const inGBP = Number(value) / fromMeta.perGBP;
  return inGBP * toMeta.perGBP;
}
function clamp2(value){ return Math.round(value * 100) / 100; }
function saveState(){
  const payload = {
    ticker: $('ticker').value,
    pattern: $('pattern').value,
    catalyst: $('catalyst').value,
    session: $('session').value,
    riskPct: $('riskPct').value,
    entry: $('entry').value,
    stop: $('stop').value,
    target: $('target').value,
    shares: $('shares').value,
    accountSize: $('accountSize').value,
    currency: $('currency').value,
    direction: state.direction,
    status: state.status,
    stopPercent: state.stopPercent,
    stopTouched: state.stopTouched,
    targetTouched: state.targetTouched,
    sharesTouched: state.sharesTouched
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  localStorage.setItem(NOTE_KEY, '');
  localStorage.setItem(JOURNAL_KEY, JSON.stringify(state.journal));
}
function loadState(){
  populateSelect($('pattern'), patternOptions);
  populateSelect($('catalyst'), catalystOptions);
  populateSelect($('session'), sessionOptions);
  $('session').value = guessSession();
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
  if(saved){
    $('ticker').value = saved.ticker || '';
    $('pattern').value = saved.pattern || '';
    $('catalyst').value = saved.catalyst || '';
    $('session').value = saved.session || '';
    $('riskPct').value = saved.riskPct || '0.01';
    $('entry').value = saved.entry || '0.00';
    $('stop').value = saved.stop || '0.00';
    $('target').value = saved.target || '0.00';
    $('shares').value = saved.shares || '0';
    $('accountSize').value = saved.accountSize || '0.00';
    $('currency').value = saved.currency || 'GBP';
    state.direction = saved.direction || 'long';
    state.status = saved.status || 'watching';
    state.stopPercent = Number(saved.stopPercent || 0.10);
    state.stopTouched = false;  // always recalc on load
    state.targetTouched = false; // always recalc on load
    state.sharesTouched = !!saved.sharesTouched;
  } else {
    $('pattern').value = '';
    $('catalyst').value = '';
    $('session').value = '';
    $('accountSize').value = '';
    $('ticker').value = '';
  $('quickNote').value = '';
    $('entry').value = '';
    $('stop').value = '';
    $('target').value = '';
    $('shares').value = '';
  }
  state.note = '';
  if($('quickNote')) $('quickNote').value = '';
  state.journal = JSON.parse(localStorage.getItem(JOURNAL_KEY) || '[]');
  if($('notePreview')) $('notePreview').textContent = state.note ? state.note : '';
  document.querySelectorAll('.segmented button').forEach(btn => btn.classList.toggle('active', btn.dataset.dir === state.direction));
  document.querySelectorAll('.currency-toggle button').forEach(btn => btn.classList.toggle('active', btn.dataset.currency === $('currency').value));
  // Update account size label to match loaded currency
  const loadedCurrency = $('currency').value;
  const loadedSym = currencyMeta[loadedCurrency]?.symbol || loadedCurrency;
  const lbl = document.getElementById('accountSizeLabel');
  if(lbl) lbl.textContent = `Account Size (${loadedSym})`;
  setStatus(state.status || 'watching');
  // Sync SL% toggle label
  const slTog = document.getElementById('slPctToggle');
  if(slTog) slTog.textContent = 'Risk ' + Math.round(state.stopPercent * 100) + '%';
  renderJournal();
  recalc();
}
function cycleSLPercent(){
  const steps = [0.05, 0.10, 0.15, 0.20];
  const cur = state.stopPercent;
  const idx = steps.indexOf(cur);
  const next = steps[(idx + 1) % steps.length];
  state.stopPercent = next;
  const pct = Math.round(next * 100);
  document.getElementById('slPctToggle').textContent = 'Risk ' + pct + '%';
  // Reset stop so it recalculates at new %
  state.stopTouched = false;
  $('stop').value = '';
  $('target').value = '';
  state.targetTouched = false;
  recalc();
  showToast('SL set to ' + pct + '%');
}

function recalc(){
  const entry = num($('entry').value);
  let stop = num($('stop').value);
  let target = num($('target').value);
  const currency = $('currency').value;
  const riskPct = num($('riskPct').value);
  // Account size is always stored in the currently selected currency display
  // Convert to GBP for internal calculations
  const accountDisplayed = num($('accountSize').value);
  const accountGBP = convertMoney(accountDisplayed, currency, baseCurrency);

  // Auto-calculate stop at 10% if not manually set
  if(entry > 0 && !state.stopTouched){
    stop = state.direction === 'long' ? entry * (1 - state.stopPercent) : entry * (1 + state.stopPercent);
    stop = clamp2(stop);
    $('stop').value = stop.toFixed(2);
  }
  // Auto-calculate target at exactly 3R if not manually set
  if(entry > 0 && stop > 0 && !state.targetTouched){
    const riskPerShare = Math.abs(entry - stop);
    target = state.direction === 'long' ? entry + (riskPerShare * 3) : entry - (riskPerShare * 3);
    target = clamp2(target);
    $('target').value = target.toFixed(2);
  }

  const currentStop = num($('stop').value);
  const currentTarget = num($('target').value);
  const riskPerShare = Math.abs(entry - currentStop);
  const rewardPerShare = Math.abs(currentTarget - entry);
  const maxRiskGBP = accountGBP * riskPct;
  const maxRiskDisplay = convertMoney(maxRiskGBP, baseCurrency, currency);

  if(entry > 0 && riskPerShare > 0 && !state.sharesTouched){
    $('shares').value = String(Math.floor(maxRiskDisplay / riskPerShare));
  }
  const shares = Math.max(0, Math.floor(num($('shares').value)));
  const totalRiskDisplay = shares * riskPerShare;
  const capitalDisplay = shares * entry;
  const totalRiskGBP = convertMoney(totalRiskDisplay, currency, baseCurrency);
  const capitalGBP = convertMoney(capitalDisplay, currency, baseCurrency);
  const rr = riskPerShare > 0 ? rewardPerShare / riskPerShare : 0;

  $('rr').textContent = rr > 0 ? `${rr.toFixed(2)}R` : '—';
  $('quality').textContent = rr >= 3 ? 'A setup' : rr >= 2 ? 'Solid setup' : rr > 0 ? 'Needs edge' : entry > 0 ? 'Set levels' : '—';
  $('riskValue').textContent = totalRiskDisplay > 0 ? fmtMoney(totalRiskDisplay, currency) : '—';
  $('nativeRisk').textContent = totalRiskGBP > 0 ? `${fmtMoney(totalRiskGBP, baseCurrency)} · ${fmtMoney(maxRiskGBP, baseCurrency)} max` : accountGBP > 0 ? `Max: ${fmtMoney(maxRiskGBP, baseCurrency)}` : '—';
  $('capitalValue').textContent = capitalDisplay > 0 ? fmtMoney(capitalDisplay, currency) : '—';
  $('capitalPct').textContent = capitalGBP > 0 && accountGBP > 0 ? `${fmtMoney(capitalGBP, baseCurrency)} · ${((capitalGBP / accountGBP) * 100).toFixed(1)}% used` : '—';

  $('helper').textContent = entry > 0 && currentStop > 0
    ? `Ready: ${state.direction} setup, ${shares} shares, ${fmtMoney(totalRiskDisplay, currency)} at risk (${fmtMoney(totalRiskGBP, baseCurrency)}), target set to ${rr > 0 ? rr.toFixed(2) + 'R' : '—'}.`
    : '';

  saveState();
}
function getCatalystAlertPrefix(catalyst, pattern){
  const c = String(catalyst || '').trim();
  const p = String(pattern || '').trim();
  if(c === 'Short Squeeze Only' || p === 'Short Squeeze') return '🚀 Short Squeeze Alert: ';
  return '';
}
function getPnlClass(value){
  const raw = String(value ?? '').trim();
  if(raw === '') return 'pnl-neutral';
  const n = num(raw);
  if(!Number.isFinite(n) || n === 0) return 'pnl-neutral';
  return n > 0 ? 'pnl-positive' : 'pnl-negative';
}
function applyPnlVisual(shell, value){
  if(!shell) return;
  const klass = getPnlClass(value);
  const input = shell.querySelector('input');
  const sub = shell.querySelector('.field-sub');
  if(input){
    input.classList.remove('pnl-positive','pnl-negative','pnl-neutral');
    input.classList.add(klass);
  }
  if(sub){
    sub.classList.remove('pnl-positive','pnl-negative','pnl-neutral');
    sub.classList.add(klass);
    sub.textContent = formatPnlDisplayUSD(value) + ' USD';
  }
}
function buildAlertText(plan){
  const icon = plan.status === 'watching' ? '🎯' : (plan.direction === 'long' ? '🟢' : '🔴');
  const prefix = getCatalystAlertPrefix(plan.catalyst, plan.pattern);
  const now = new Date();
  const time = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
  const date = now.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
  const isSqueeze = (String(plan.catalyst || '').trim() === 'Short Squeeze Only' || String(plan.pattern || '').trim() === 'Short Squeeze');
  const catalystLine = (prefix && isSqueeze) ? `${plan.session}` : `${plan.catalyst} | ${plan.session}`;

  return (prefix ? `${prefix}

` : '') +
    `📊 CalcURisk — ${plan.ticker || 'TICKER'} | ${plan.direction.toUpperCase()}
` +
    `
` +
    `${plan.statusLabel}
` +
    `${icon} ${plan.ticker || 'TICKER'} | ${plan.direction.toUpperCase()} | ${plan.pattern}
` +
    `${catalystLine}
` +
    `Entry ${plan.entry} | SL ${plan.stop} | TP ${plan.target}
` +
    `${plan.shares} shares | ${plan.rr}
` +
    `🕐 ${time} · ${date}`;
}
function getPlan(){
  return {
    id: Date.now(),
    ticker: $('ticker').value.trim().toUpperCase(),
    note: $('quickNote').value.trim() || '',
    pattern: $('pattern').value,
    catalyst: $('catalyst').value,
    session: $('session').value,
    riskPct: $('riskPct').options[$('riskPct').selectedIndex].text,
    accountSizeGBP: $('accountSize').value,
    entry: Number(num($('entry').value)).toFixed(2),
    stop: Number(num($('stop').value)).toFixed(2),
    target: Number(num($('target').value)).toFixed(2),
    shares: String(Math.max(0, Math.floor(num($('shares').value)))),
    accountSize: $('accountSize').value,
    currency: $('currency').value,
    direction: state.direction,
    status: state.status,
    statusLabel: state.status === 'watching' ? '👁️ Watching' : '🚀 Executed',
    rr: $('rr').textContent,
    riskValue: $('riskValue').textContent,
    nativeRiskValue: $('nativeRisk').textContent,
    capitalValue: $('capitalValue').textContent,
    nativeCapitalValue: $('capitalPct').textContent,
    note: $('quickNote').value.trim() || '',
    reviewNote:'',
    actualEntry:'',
    actualExit:'',
    actualShares:'',
    actualPnL:'',
    outcome:'Planned',
    createdAt: new Date().toLocaleString('en-GB', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})
  };
}
function showToast(message){
  const toast = $('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(showToast.t);
  showToast.t = setTimeout(() => toast.classList.remove('show'), 1800);
}
async function copyText(text){
  try{
    await navigator.clipboard.writeText(text);
    return true;
  }catch(e){
    const area = document.createElement('textarea');
    area.value = text;
    document.body.appendChild(area);
    area.select();
    const ok = document.execCommand('copy');
    area.remove();
    return ok;
  }
}
async function sendAlert(){
  const plan = getPlan();
  const ok = await copyText(buildAlertText(plan));
  showToast(ok ? '✅ Alert copied' : 'Alert ready to copy');
}
function savePlanToDevice(){
  saveState();
  showToast('✅ Plan saved');
}

function saveExecutedTrade(){
  const plan = getPlan();
  state.journal.unshift(plan);
  state.journal = state.journal.slice(0, 20);
  renderJournal();
  saveState();
}
async function executePlan(){
  setStatus('executed', true);
  saveExecutedTrade();
  const plan = getPlan();
  const ok = await copyText(buildAlertText(plan));
  showToast(ok ? '🚀 Executed + saved + alert copied' : '🚀 Executed + saved');
}
function resetPlan(){
  $('ticker').value = '';
  $('entry').value = '0.00';
  $('stop').value = '0.00';
  $('target').value = '0.00';
  $('shares').value = '0';
  $('pattern').value = patternOptions[0];
  $('catalyst').value = catalystOptions[0];
  $('session').value = guessSession();
  $('riskPct').value = '0.01';
  state.stopPercent = 0.10;
  const slTogR = document.getElementById('slPctToggle');
  if(slTogR) slTogR.textContent = 'Risk 10%';
  state.stopTouched = false;
  state.targetTouched = false;
  state.sharesTouched = false;
  state.note = '';
  if($('quickNote')) $('quickNote').value = '';
  // notePreview removed
  setStatus('watching', false);
  recalc();
  showToast('Reset');
}
function escapeAttr(value){
  return String(value ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function getTradeResult(plan){
  const outcome = String(plan.outcome || '').toLowerCase();
  if(outcome === 'win') return 'win';
  if(outcome === 'loss') return 'loss';
  if(outcome === 'breakeven') return 'breakeven';
  const pnl = num(plan.actualPnL);
  if(pnl > 0) return 'win';
  if(pnl < 0) return 'loss';
  if(String(plan.actualPnL || '').trim() !== '') return 'breakeven';
  return 'pending';
}
function isTradeCompleted(plan){
  return getTradeResult(plan) !== 'pending' || String(plan.actualEntry || '').trim() !== '' || String(plan.actualExit || '').trim() !== '';
}
function updatePlanField(id, field, value){
  const plan = state.journal.find(p => String(p.id) === String(id));
  if(!plan) return;
  plan[field] = value;
  if(field === 'actualPnL'){
    const pnl = num(value);
    if(String(value).trim() === '') plan.outcome = 'Planned';
    else if(pnl > 0) plan.outcome = 'Win';
    else if(pnl < 0) plan.outcome = 'Loss';
    else plan.outcome = 'Breakeven';
    const pnlShell = document.querySelector(`[data-pnl-shell="${id}"]`);
    applyPnlVisual(pnlShell, value);
  }
  saveState();
  // Only do a full re-render if outcome changed (affects summary bar)
  if(field === 'actualPnL' || field === 'outcome'){
    const {completed, wins, total, winRate} = buildCompletedSummary();
    const summary = $('journalSummary');
    if(summary) summary.innerHTML = `<div class="summary-bar">
      <div class="summary-mini"><div class="k">Completed</div><div class="v">${total}</div></div>
      <div class="summary-mini"><div class="k">Wins</div><div class="v">${wins}</div></div>
      <div class="summary-mini"><div class="k">Win Rate</div><div class="v">${winRate}%</div></div>
    </div>`;
  }
}
function buildCompletedSummary(){
  const completed = state.journal.filter(isTradeCompleted);
  const wins = completed.filter(item => getTradeResult(item) === 'win').length;
  const total = completed.length;
  const winRate = total ? Math.round((wins / total) * 100) : 0;
  return {completed, wins, total, winRate};
}

function formatPnlDisplayGBP(value){
  const raw = String(value ?? '').trim();
  if(raw === '') return '—';
  const n = num(raw);
  if(!Number.isFinite(n)) return '—';
  const absText = fmtMoney(Math.abs(n), 'GBP');
  return n < 0 ? `-${absText}` : absText;
}
function formatPnlDisplayUSD(value){
  const raw = String(value ?? '').trim();
  if(raw === '') return '—';
  const n = num(raw);
  if(!Number.isFinite(n)) return '—';
  const usd = Math.abs(n) * currencyMeta.USD.perGBP;
  const absText = fmtMoney(usd, 'USD');
  return n < 0 ? `-${absText}` : absText;
}
function getJournalFieldOrder(id){
  return Array.from(document.querySelectorAll(`[data-plan-id="${id}"][data-field]`));
}
function focusNextJournalField(id, field){
  const fields = getJournalFieldOrder(id);
  const idx = fields.findIndex(el => el.dataset.field === field);
  if(idx >= 0 && idx < fields.length - 1){
    const next = fields[idx + 1];
    requestAnimationFrame(() => {
      next.focus();
      if(next.select) next.select();
    });
  }
}
function buildReviewText(plan){
  const base = String(plan.reviewNote || '').trim();
  if(base) return base;
  return [
    '• Setup reasoning:',
    '• Market context:',
    '• Execution (followed plan?):',
    '• What went well:',
    '• What I’d do differently:',
    '• Lesson learned:'
  ].join('\n');
}
function formatDayPnlGBP(completed){
  return completed.reduce((sum, p) => sum + num(p.actualPnL), 0);
}
function getMovePct(plan){
  const entry = num(plan.actualEntry || plan.entry);
  const exitVal = num(plan.actualExit || plan.target);
  if(!entry || !exitVal) return '';
  const pct = ((exitVal - entry) / entry) * 100;
  return `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
}
function getGapGBP(plan){
  const plannedShares = Math.max(0, Math.floor(num(plan.shares)));
  const plannedEntry = num(plan.entry);
  const plannedTarget = num(plan.target);
  const plannedPnl = Math.abs((plannedTarget - plannedEntry) * plannedShares);
  const actualPnl = num(plan.actualPnL);
  return actualPnl - plannedPnl;
}
function getGapLabel(gap){
  if(gap > 0.009) return '🔥 Exceeded plan';
  if(gap < -0.009) return '⚠️ Left profit on table';
  return '🎯 Executed to plan';
}
function formatSignedMoney(value, currency){
  const abs = fmtMoney(Math.abs(value), currency);
  if(value > 0) return `+ ${abs}`;
  if(value < 0) return `- ${abs}`;
  return abs;
}
function buildJournalCopyText(plan, idx){
  const result = getTradeResult(plan);
  const resultLabel = result === 'win' ? 'Win' : result === 'loss' ? 'Loss' : result === 'breakeven' ? 'Breakeven' : (plan.outcome || 'Planned');
  const actualPnlGBP = num(plan.actualPnL);
  const actualPnlUSD = actualPnlGBP * currencyMeta.USD.perGBP;
  const gapGBP = getGapGBP(plan);
  const gapUSD = gapGBP * currencyMeta.USD.perGBP;
  const movePct = getMovePct(plan);
  const reviewText = buildReviewText(plan);
  return [
    `${idx}. 📝 ${plan.ticker || 'TICKER'} — ${plan.direction ? plan.direction[0].toUpperCase() + plan.direction.slice(1) : 'Long'}`,
    `📊 ${plan.pattern} (${plan.session})`,
    '',
    '🎯 Planned',
    '',
    `🔵 E ${plan.entry} → 🔴 SL ${plan.stop} → 🟢 TP ${plan.target}`,
    '',
    `📦 ${plan.shares} shares | ${plan.rr}`,
    `🕒 Planned: ${plan.createdAt}`,
    '📨 Sent: —',
    `🚀 Executed: ${plan.createdAt}`,
    '',
    '──────────────',
    '',
    '✅ Actual',
    '',
    `🔵 E ${plan.actualEntry || '—'} → 🔴 SL ${plan.actualExit || '—'} → 🟢 TP ${plan.target || '—'}`,
    '',
    `📦 ${plan.actualShares || '—'} shares`,
    `💵 ${formatSignedMoney(actualPnlUSD, 'USD')} = ${formatSignedMoney(actualPnlGBP, 'GBP')}`,
    movePct ? `📈 Move: ${movePct}` : null,
    `🎯 Gap: ${formatSignedMoney(gapGBP, 'GBP')} (${formatSignedMoney(gapUSD, 'USD')})`,
    getGapLabel(gapGBP),
    `🏁 Outcome: ${resultLabel}`,
    '',
    '',
    '──────── Trade Review ────────',
    '',
    '🗒️ Notes',
    '',
    reviewText
  ].filter(Boolean).join('\n');
}
function buildBatchJournalText(){
  const {completed, wins, total, winRate} = buildCompletedSummary();
  if(!total) return '';
  const dayPnlGBP = formatDayPnlGBP(completed);
  const dayPnlUSD = dayPnlGBP * currencyMeta.USD.perGBP;
  const winWord = wins === 1 ? 'win' : 'wins';
  const losses = total - wins;
  const cheer = total ? `👏 Strong work today — ${wins} ${winWord} from ${total}, and you stayed in control.` : '';
  const header = [
    '📊 CalcURisk — Trading Day Summary',
    '━━━━━━━━━━━━━━━━━━━━━━',
    '',
    `✅ Wins: ${wins}   ❌ Losses: ${losses}   📋 Total: ${total}`,
    `🎯 Win Rate: ${winRate}%`,
    '',
    `💰 Day P/L: ${formatSignedMoney(dayPnlUSD, 'USD')} (${formatSignedMoney(dayPnlGBP, 'GBP')})`,
    '',
    cheer,
    '',
    '━━━━━━━━━━━━━━━━━━━━━━'
  ].join('\n');
  const body = completed.map((plan, idx) => buildJournalCopyText(plan, idx + 1)).join('\n\n────────────────────\n\n');
  return `${header}\n\n────────────────────\n\n${body}`;
}

function makeInput(planId, field, value, inputmode, placeholder){
  const labels = {actualEntry:'Actual Entry',actualExit:'Actual Exit',actualShares:'Actual Shares',actualPnL:'P/L (£ GBP)'};
  const shell = document.createElement('div');
  shell.className = 'input-shell';

  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = labels[field] || field;

  const input = document.createElement('input');
  input.type = 'text';
  input.inputMode = inputmode || 'decimal';
  input.value = value || '';
  input.placeholder = placeholder || '—';
  input.dataset.planId = planId;
  input.dataset.field = field;
  input.style.cssText = 'width:100%;background:none;border:none;outline:none;color:var(--text);font-size:15px;font-weight:700;font-family:inherit;padding:2px 0;-webkit-user-select:text;user-select:text;touch-action:manipulation;';

  input.addEventListener('change', function(){
    updatePlanField(planId, field, this.value.trim());
  });
  input.addEventListener('blur', function(){
    updatePlanField(planId, field, this.value.trim());
  });

  shell.appendChild(lbl);
  shell.appendChild(input);
  return shell;
}

function duplicatePlan(id){
  const plan = state.journal.find(p => String(p.id) === String(id));
  if(!plan) return;
  // Create a fresh copy in the journal with same planned levels but blank actuals
  const copy = Object.assign({}, plan, {
    id: Date.now(),
    actualEntry: '',
    actualExit: '',
    actualShares: '',
    actualPnL: '',
    outcome: 'Planned',
    reviewNote: '',
    createdAt: new Date().toLocaleString('en-GB', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    statusLabel: '👁️ Watching'
  });
  state.journal.unshift(copy);
  state.journal = state.journal.slice(0, 20);
  renderJournal();
  saveState();
  showToast('Duplicated — fill in new actuals');
}

function loadPlan(id){
  const plan = state.journal.find(p => String(p.id) === String(id));

  $('ticker').value = plan.ticker;

  $('entry').value = plan.entry;
  $('stop').value = plan.stop;
  $('target').value = plan.target;
  $('shares').value = plan.shares;
  $('currency').value = plan.currency;
  state.direction = plan.direction;

// Swipe down to close drawer
(function(){
  const drawer = document.getElementById('journalDrawer');
  let startY = 0, startT = 0, dragging = false;

  drawer.addEventListener('touchstart', function(e){
    // Only track swipes starting on the drawer-head (drag handle area)
    if(e.target.closest('.drawer-head, .drawer-handle')){
      startY = e.touches[0].clientY;
      startT = Date.now();
      dragging = true;
    }
  }, {passive:true});

  drawer.addEventListener('touchmove', function(e){
    if(!dragging) return;
    const dy = e.touches[0].clientY - startY;
    if(dy > 0){
      drawer.style.transform = 'translateY(' + dy + 'px)';
      drawer.style.transition = 'none';
    }
  }, {passive:true});

  drawer.addEventListener('touchend', function(e){
    if(!dragging) return;
    dragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    const dt = Date.now() - startT;
    drawer.style.transition = '';
    drawer.style.transform = '';
    // Close if dragged down >80px or fast flick >30px in <250ms
    if(dy > 80 || (dy > 30 && dt < 250)){
      closeDrawer();
    }
  }, {passive:true});
})();

  <div style="position:absolute;bottom:48px;left:32px;right:32px;z-index:1;">

      <div id="splashProgress" style="height:100%;width:0%;background:linear-gradient(90deg,#00e5ff,#00ff9d);border-radius:2px;"></div>
    </div>

<script>
(function(){
  var DURATION=1100;
  var start=Date.now();
  var inst=document.getElementById('splashScreen');
  var prog=document.getElementById('splashProgress');
  function tickP(){var p=Math.min((Date.now()-start)/DURATION*100,100);if(prog)prog.style.width=p+'%';if(p<100)requestAnimationFrame(tickP);}
  requestAnimationFrame(tickP);
  var canvas=document.getElementById('splashCanvas');
  var ctx=canvas?canvas.getContext('2d'):null;
  if(ctx){
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    var pts=[];
    for(var i=0;i<40;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+0.3,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,a:Math.random()*0.35+0.1,c:Math.random()>0.5?'0,229,255':'0,255,157'});
    function drawP(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(function(p){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba('+p.c+','+p.a+')';ctx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;});requestAnimationFrame(drawP);}
    drawP();
  }
  setTimeout(function(){['gl1','gl2','gl3','gv1','gv2','gv3'].forEach(function(id){var e=document.getElementById(id);if(e){e.style.transition='opacity 0.2s';e.style.opacity='0.15';}});},60);
  setTimeout(function(){var c=document.getElementById('splashCandles');if(c)c.style.opacity='1';},80);
  setTimeout(function(){
    var arr=document.getElementById('splashArrow');if(arr)arr.style.opacity='1';
    var mp=document.getElementById('aMainPath'),gp=document.getElementById('aGlowPath');
    if(mp){mp.style.transition='stroke-dashoffset 0.28s cubic-bezier(0.4,0,0.2,1)';mp.style.strokeDashoffset='0';}
    if(gp){gp.style.transition='stroke-dashoffset 0.28s cubic-bezier(0.4,0,0.2,1)';gp.style.strokeDashoffset='0';}
    setTimeout(function(){var h=document.getElementById('aHead');if(h){h.style.transition='opacity 0.15s';h.style.opacity='1';}},260);
  },300);
  setTimeout(function(){var l=document.getElementById('splashLogos');if(l){l.style.transition='opacity 0.3s ease,transform 0.3s ease';l.style.opacity='1';l.style.transform='translateY(0)';}},620);
  setTimeout(function(){var sp=document.getElementById('splashScreen');if(sp){sp.style.transition='opacity 0.2s ease';sp.style.opacity='0';setTimeout(function(){if(sp&&sp.parentNode)sp.parentNode.removeChild(sp);},200);}},DURATION);
})();
</script>
